version: 2

models:
  - name: fct_order_items
    columns:
      - name: order_item_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - relationships:
              to: ref('dim_users')
              field: user_id
      - name: net_revenue
        tests:
          - not_null   